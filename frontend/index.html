<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SingleTask AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: "Inter", sans-serif;
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #d9eaff, #f7faff);
      min-height: 100vh;
      color: #1a1a1a;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #0a3d62;
    }

    input, select {
      width: 90%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #bcd0e7;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #0a84ff;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #006edc;
    }

    #current-task {
      margin-top: 30px;
      font-size: 22px;
      font-weight: bold;
      color: #0a3d62;
    }

    .task-box {
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      text-align: left;
      position: relative;
    }

    .delete-btn {
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      position: absolute;
      right: 10px;
      top: 10px;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 12px;
      margin-right: 6px;
      color: white;
    }

    .priority-high { background: #e74c3c; }
    .priority-medium { background: #f1c40f; }
    .priority-low { background: #2ecc71; }

    .difficulty-hard { background: #8e44ad; }
    .difficulty-medium { background: #3498db; }
    .difficulty-easy { background: #1abc9c; }

    .energy-high { background: #ff6b6b; }
    .energy-medium { background: #ffa502; }
    .energy-low { background: #2ed573; }

    h3 {
      margin-top: 35px;
      color: #0a3d62;
      font-size: 22px;
    }
  </style>
</head>

<body>

  <h2>SingleTask AI</h2>

  <!-- Emotional State -->
  <select id="emotionSelect" onchange="updateEmotion()">
    <option value="neutral">How are you feeling?</option>
    <option value="tired">Tired</option>
    <option value="stressed">Stressed</option>
    <option value="overwhelmed">Overwhelmed</option>
    <option value="motivated">Motivated</option>
  </select>

  <!-- Task Input -->
  <input id="taskInput" placeholder="Type what's in your head..." />
  <button onclick="addTask()">Add</button>
  <button onclick="parseTasks()">AI Parse Tasks</button>

  <!-- Current Task -->
  <div id="current-task">No task yet.</div>
  <button id="completeBtn" onclick="completeTask()" disabled>Done</button>

  <!-- AI Next Task -->
  <button onclick="loadNextTask()">AI Pick Next Task</button>

  <!-- CLEAR COMPLETED -->
  <button style="background:#444;color:white;" onclick="clearCompleted()">Clear Completed Tasks</button>

  <!-- GROUPED TASK LISTS -->
  <h3>Pending Tasks</h3>
  <div id="pendingList"></div>

  <h3>Completed Tasks</h3>
  <div id="completedList"></div>

<script>
const API = "https://singletask-ai-1.onrender.com/api/tasks";
let currentTaskId = null;

// ---------------- EMOTION ----------------
async function updateEmotion() {
  const state = document.getElementById("emotionSelect").value;
  await fetch(API + "/emotion", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ state })
  });
}

// ---------------- ADD TASK ----------------
async function addTask() {
  const text = document.getElementById("taskInput").value;

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  loadCurrentTask();
  loadAllTasks();
}

// ---------------- AI PARSE TASKS ----------------
async function parseTasks() {
  const text = document.getElementById("taskInput").value;

  const res = await fetch(API + "/parse", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const raw = await res.text();
  try {
    const data = JSON.parse(raw);
    alert("AI created " + data.count + " tasks.");
  } catch (e) {
    alert("Backend error. Check console.");
  }

  loadCurrentTask();
  loadAllTasks();
}

// ---------------- CURRENT TASK ----------------
async function loadCurrentTask() {
  const res = await fetch(API + "/current");
  if (res.status === 204) {
    document.getElementById("current-task").innerText = "No task yet.";
    document.getElementById("completeBtn").disabled = true;
    currentTaskId = null;
    return;
  }

  const task = await res.json();
  currentTaskId = task.id;
  document.getElementById("current-task").innerText = task.title;
  document.getElementById("completeBtn").disabled = false;
}

// ---------------- COMPLETE TASK ----------------
async function completeTask() {
  if (!currentTaskId) return;

  await fetch(API + "/" + currentTaskId + "/complete", { method: "POST" });

  currentTaskId = null;

  loadCurrentTask();
  loadAllTasks();
}

// ---------------- AI NEXT TASK ----------------
async function loadNextTask() {
  const res = await fetch(API + "/next");
  if (res.status === 204) {
    alert("No next task found.");
    return;
  }

  const task = await res.json();
  currentTaskId = task.id;
  document.getElementById("current-task").innerText = task.title;

  loadAllTasks();
}

// ---------------- DELETE TASK ----------------
async function deleteTask(id) {
  await fetch(API + "/" + id, { method: "DELETE" });
  loadAllTasks();
  loadCurrentTask();
}

// ---------------- CLEAR COMPLETED ----------------
async function clearCompleted() {
  await fetch(API + "/clear-completed", { method: "POST" });
  loadAllTasks();
  loadCurrentTask();
}

// ---------------- GROUPED TASK LISTS ----------------
async function loadAllTasks() {
  const res = await fetch(API);
  const tasks = await res.json();

  const pendingList = document.getElementById("pendingList");
  const completedList = document.getElementById("completedList");

  pendingList.innerHTML = "";
  completedList.innerHTML = "";

  tasks.forEach(t => {
    const div = document.createElement("div");
    div.className = "task-box";

    div.innerHTML = `
      <button class="delete-btn" onclick="deleteTask('${t.id}')">Delete</button>
      <b>${t.title}</b><br><br>

      <span class="badge priority-${t.priority}">${t.priority}</span>
      <span class="badge difficulty-${t.difficulty}">${t.difficulty}</span>
      <span class="badge energy-${t.energy}">${t.energy}</span>

      <br><br>
      Duration: ${t.duration}<br>
      Deadline: ${t.deadline}
    `;

    if (t.status === "PENDING") {
      pendingList.appendChild(div);
    } else {
      completedList.appendChild(div);
    }
  });
}

// Load tasks on page load
loadAllTasks();
loadCurrentTask();
</script>

</body>
</html>
